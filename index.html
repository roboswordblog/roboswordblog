
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impossible Password Checker</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Open+Sans&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: #111;
            color: white;
            font-family: 'Open Sans', sans-serif;
            overflow: hidden;
        }

        .passwordScreen {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #111, #1f1f1f);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .passwordBox {
            width: 550px;
            background: #222;
            border: 2px solid #FFAB40;
            border-radius: 30px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255,171,64,0.3);
        }

        .passwordBox h1 {
            color: #FFAB40;
            font-family: 'Orbitron', sans-serif;
            font-size: 38px;
            margin-bottom: 20px;
        }

        .passwordBox input {
            width: 80%;
            padding: 15px;
            font-size: 18px;
            border-radius: 15px;
            border: none;
            outline: none;
            background: #333;
            color: white;
        }

        .passwordBox button {
            margin-top: 20px;
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            border-radius: 20px;
            background: #FFAB40;
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .passwordBox button:hover {
            transform: scale(1.05);
        }

        .requirements {
            margin-top: 25px;
            background: #1a1a1a;
            border-radius: 20px;
            padding: 20px;
            max-height: 250px;
            overflow-y: auto;
            text-align: left;
        }

        .requirements p {
            color: #ff6b6b;
            margin: 10px 0;
            font-size: 15px;
        }

        .loadingScreen {
            position: fixed;
            inset: 0;
            background: black;
            color: #00ff00;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-family: monospace;
            z-index: 9999;
        }

        .loadingScreen h1 {
            font-size: 50px;
            margin-bottom: 30px;
        }

        .loadingBar {
            width: 450px;
            height: 30px;
            border: 2px solid #00ff00;
        }

        .loadingFill {
            width: 0%;
            height: 100%;
            background: #00ff00;
            transition: width 3s linear;
        }

        .finalText {
            font-size: 50px;
            color: #00ff00;
            text-shadow: 0 0 10px #00ff00;
            animation: flicker 1s infinite alternate;
        }

        @keyframes flicker {
            from {
                opacity: 1;
            }
            to {
                opacity: 0.7;
            }
        }
    </style>
</head>

<body>

<div class="passwordScreen" id="passwordScreen">

    <div class="passwordBox">

        <h1>PASSWORD TO ROBOSWORD's BLOG</h1>

        <input type="text" id="passwordInput" placeholder="Enter password...">

        <br>

        <button onclick="checkPassword()">Submit Password</button>

        <div class="requirements" id="requirements">
            <p>❌ Must contain a capital letter</p>
        </div>

    </div>

</div>

<div class="loadingScreen" id="loadingScreen">

    <h1>PASSWORD ACCEPTED</h1>

    <div class="loadingBar">
        <div class="loadingFill" id="loadingFill"></div>
    </div>

</div>

<script>

const requirements = [

    "❌ Must contain a number",
    "❌ Must contain a special character",
    "❌ Must contain a video game character",
    "❌ Must contain exactly 5 letters",
    "❌ Must contain forbidden energy",
    "❌ Password lacks aura",
    "❌ Password must contain a 3",
    "❌ Password is too weak",
    "❌ Password is too strong",
    "❌ Password must contain the letter K",
    "❌ Password must appease the coding gods",
    "❌ Password contains suspicious activity",
    "❌ Password detected by anti-cheese systems",
    "❌ Password must include an exclamation mark",
    "❌ Password rejected by quantum security",
    "❌ Password is emotionally unstable",
    "❌ Password has too much confidence",
    "❌ Password not approved by Kirby"
];

let currentRequirement = 0;

function checkPassword() {

    const input = document.getElementById("passwordInput").value;
    const reqBox = document.getElementById("requirements");

    // ONLY WORKING PASSWORD
    if (input === "K!RB3") {

        document.getElementById("passwordScreen").style.display = "none";

        const loadingScreen = document.getElementById("loadingScreen");

        loadingScreen.style.display = "flex";

        setTimeout(() => {
            document.getElementById("loadingFill").style.width = "100%";
        }, 100);

        setTimeout(() => {

            loadingScreen.innerHTML = `
                <div class="finalText">
                    PASSWORD CHECK 2
                </div>
            `;

        }, 3500);

        return;
    }

    // Add more fake requirements every submit
    if (currentRequirement < requirements.length) {

        const p = document.createElement("p");

        p.innerText = requirements[currentRequirement];

        reqBox.appendChild(p);

        currentRequirement++;

    } else {

        const randomFail = document.createElement("p");

        randomFail.innerText = "❌ Password rejected for unknown reasons";

        reqBox.appendChild(randomFail);
    }
}

</script>

</body>
</html>
